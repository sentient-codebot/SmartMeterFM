# Second reflow pass — distill from LCL-0421-REFLOW (first reflow student).
# The first reflow preserved the teacher's ceiling but didn't compress the ODE
# enough: Student@20 NFE still loses to the linear baseline on SR/imputation.
# Since the first-reflow student already has straighter trajectories than the
# original teacher, we can re-generate pairs at NFE=50 (vs 200 the first time).
#
# Deltas vs lcl_0421_reflow.toml:
#   - reflow.teacher_checkpoint  → the first reflow's last.ckpt
#   - reflow.teacher_num_step    200 → 50
#   - reflow.num_pairs           100000 (unchanged; conditions are the same)
#   - train.reflow_pairs_path    → new cache file
#   - train.warmup_steps         1000 → 500 (warm-starting from already-distilled)
#   - everything else identical to lcl_0421_reflow.toml

exp_id = "showcase_lcl_electricity_reflow2"
log_wandb = true
log_mlflow = false

[reflow]
teacher_checkpoint = "checkpoints/LCL-0421-REFLOW/last.ckpt"
num_pairs = 100000
pair_batch_size = 256
teacher_num_step = 50
cfg_scale = 1.0
use_ema_teacher = true
pairs_dtype = "fp32"

[data]
dataset = "lcl_electricity"
root = "data/lcl_electricity/"
load = true
normalize = true
normalize_method = "constant"
pit = false
resolution = "30min"
segment_type = "monthly"
shuffle = true
vectorize = true
style_vectorize = "patchify"
vectorize_window_size = 16
target_labels = ["month", "year"]
train_season = "whole_year"
val_season = "whole_year"

[flow]
prediction_type = "velocity"

[model]
model_class = "gpt2"
dim_base = 256
conditioning = true
cond_dropout = 0.1
dropout = 0.1
num_attn_head = 4
dim_feedforward = 1024
num_encoder_layer = 0
num_decoder_layer = 12
learn_variance = false
num_in_channel = 16
seq_length = 93
freeze_layers = false
resume = false

[sample]
num_sample = 100
val_batch_size = 64
num_sampling_step = 100
method = "euler"
cfg_scale = 1.0

[train]
batch_size = 256
lr = 0.0001
adam_betas = [0.9, 0.95]
weight_decay = 0.05
warmup_steps = 500
lr_schedule = "cosine"
time_sampling = "logit_normal"
logit_normal_mean = 0.0
logit_normal_std = 1.0
gradient_accumulate_every = 1
ema_update_every = 5
ema_decay = 0.99995
amp = true
mixed_precision_type = "bf16"
split_batches = true
num_train_step = 30000
save_and_sample_every = 5000
val_every = 1000
val_batch_size = 64
reflow_mode = true
reflow_pairs_path = "data/reflow_pairs/lcl_0421_reflow_50nfe.pt"

[train.val_sample_config]
num_sample = 256
val_batch_size = 64
num_sampling_step = 20
cfg_scale = 1.0
