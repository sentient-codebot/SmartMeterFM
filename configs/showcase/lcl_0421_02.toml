# SmartMeterFM Showcase Configuration
# Flow Matching model for LCL Smart Meter Electricity data — monthly segments
#
# Dataset: Low Carbon London (Zenodo CC-BY 4.0)
# ~5,500 households at 30-min resolution, 2012–2013
# Monthly segments padded to 31 days: 31 × 48 = 1488 timesteps
# After patchify(8): seq_length = 186, num_in_channel = 8
#
# Deltas vs lcl_0421_01.toml (patch-size ablation):
#   - vectorize_window_size 16 → 8
#   - num_in_channel 16 → 8
#   - seq_length 93 → 186
# Model size and training recipe otherwise identical to 0421_01 for clean A/B.

exp_id = "showcase_lcl_electricity_flow_monthly"
log_wandb = true
log_mlflow = false

[data]
dataset = "lcl_electricity"
root = "data/lcl_electricity/"
load = true
normalize = true
normalize_method = "constant"  # ConstantScaler: data / max, preserves 0→0
pit = false
resolution = "30min"  # LCL native resolution (no upsampling supported)
segment_type = "monthly"
shuffle = true
vectorize = true
style_vectorize = "patchify"
vectorize_window_size = 8
target_labels = ["month", "year"]
train_season = "whole_year"
val_season = "whole_year"

[flow]
prediction_type = "velocity"

[model]
model_class = "gpt2"
dim_base = 256
conditioning = true
cond_dropout = 0.1
dropout = 0.1
num_attn_head = 4
dim_feedforward = 1024
num_encoder_layer = 0
num_decoder_layer = 12
learn_variance = false
num_in_channel = 8    # = vectorize_window_size (patch_size)
seq_length = 186      # 1488 / 8 (31 days × 48 steps/day at 30min, patchified)
freeze_layers = false
resume = false

[sample]
num_sample = 100
val_batch_size = 64
num_sampling_step = 100
method = "euler"
cfg_scale = 1.0

[train]
batch_size = 256
lr = 0.0001
adam_betas = [0.9, 0.95]
weight_decay = 0.05
warmup_steps = 2000
lr_schedule = "cosine"
time_sampling = "logit_normal"
logit_normal_mean = 0.0
logit_normal_std = 1.0
gradient_accumulate_every = 1
ema_update_every = 5
ema_decay = 0.99995
amp = true
mixed_precision_type = "bf16"
split_batches = true
num_train_step = 50000
save_and_sample_every = 10000
val_every = 1000
val_batch_size = 64

[train.val_sample_config]
num_sample = 256
val_batch_size = 64
num_sampling_step = 50
cfg_scale = 1.0
