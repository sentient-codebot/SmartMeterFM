# SmartMeterFM Showcase Configuration — DEBUG
# Reduced training steps for quick sanity check
# Based on lcl_electricity_flow_monthly.toml

exp_id = "showcase_lcl_electricity_flow_monthly_debug"
log_wandb = false
log_mlflow = false

[data]
dataset = "lcl_electricity"
root = "data/lcl_electricity/"
load = true
normalize = true
normalize_method = "meanstd"
pit = false
resolution = "30min"
segment_type = "monthly"
shuffle = true
vectorize = true
style_vectorize = "patchify"
vectorize_window_size = 16
target_labels = ["month"]
train_season = "whole_year"
val_season = "whole_year"

[flow]
prediction_type = "velocity"

[model]
model_class = "gpt2"
dim_base = 64
conditioning = true
cond_dropout = 0.1
dropout = 0.1
num_attn_head = 4
dim_feedforward = 256
num_encoder_layer = 0
num_decoder_layer = 6
learn_variance = false
num_in_channel = 16
seq_length = 93
freeze_layers = false
resume = false

[sample]
num_sample = 100
val_batch_size = 64
num_sampling_step = 100
method = "euler"
cfg_scale = 1.0

[train]
batch_size = 32
lr = 0.0001
adam_betas = [0.9, 0.999]
gradient_accumulate_every = 1
ema_update_every = 5
ema_decay = 0.9999
amp = true
mixed_precision_type = "bf16"
split_batches = true
num_train_step = 200
save_and_sample_every = 100
val_every = 50
val_batch_size = 64

[train.val_sample_config]
num_sample = 64
val_batch_size = 64
num_sampling_step = 50
cfg_scale = 1.0
